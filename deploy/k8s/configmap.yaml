apiVersion: v1
kind: ConfigMap
metadata:
  name: supply-chain-agent-config
  namespace: supply-chain
data:
  SAP_MOCK_BASE_URL: "http://sap-mock:8001"
  OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "supply-chain-agent"
  OTEL_SERVICE_VERSION: "1.0.0"
  AZURE_SEARCH_INDEX_POLICY: "policy-docs"
  AZURE_SEARCH_INDEX_EPISODIC: "episodic-memory"
  COSMOS_DATABASE: "supply-chain-agent"
  COSMOS_CONTAINER_CHECKPOINTS: "checkpoints"
  COSMOS_CONTAINER_KPI: "kpis"
  COSMOS_CONTAINER_APPROVALS: "approval-queue"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  GRAFANA_OTLP_ENDPOINT: "https://otlp-gateway-prod-us-east-0.grafana.net/otlp"
  GRAFANA_INSTANCE_ID: ""  # set per environment; GRAFANA_API_KEY comes from Key Vault

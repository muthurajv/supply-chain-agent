apiVersion: v1
kind: Service
metadata:
  name: supply-chain-agent
  namespace: supply-chain
spec:
  selector:
    app: supply-chain-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: sap-mock
  namespace: supply-chain
spec:
  selector:
    app: sap-mock
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP

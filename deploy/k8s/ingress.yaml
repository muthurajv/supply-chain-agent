# NGINX Ingress for supply-chain-agent on AKS
# Prerequisites:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace \
#     --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz
#
# TLS certificate is managed by cert-manager + Let's Encrypt.
# Replace <your-domain> with the actual DNS name pointing to the ingress
# controller's public IP (e.g. supply-chain-agent.eastus.cloudapp.azure.com).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supply-chain-agent
  namespace: supply-chain
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"   # allow long /chat turns
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # Azure AD authentication via oauth2-proxy sidecar (Entra ID / AAD).
    # Remove the auth annotations if you are handling auth inside the app.
    nginx.ingress.kubernetes.io/auth-url: "https://$host/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <your-domain>
      secretName: supply-chain-agent-tls
  rules:
    - host: <your-domain>
      http:
        paths:
          # Main API — all routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supply-chain-agent
                port:
                  number: 80
---
# oauth2-proxy deployment for Azure AD / Entra ID SSO.
# Secrets (client-id, client-secret, cookie-secret) must be added to Key Vault
# and referenced via secrets-provider.yaml, or supplied as a separate Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: supply-chain
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=azure
            - --azure-tenant=<tenant-id>
            - --upstream=http://supply-chain-agent:80
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
            - --skip-provider-button=true
            - --silence-ping-logging=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: supply-chain
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180

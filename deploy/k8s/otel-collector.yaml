# OpenTelemetry Collector — DaemonSet (one pod per AKS node)
#
# Receives OTLP from agent pods, enriches with K8s metadata, and fans out to:
#   - Azure Monitor (Application Insights) for traces + metrics + logs
#   - Prometheus scrape endpoint on :8889 for Grafana / Mimir
#
# Prerequisites:
#   kubectl apply -f https://github.com/open-telemetry/opentelemetry-operator/releases/latest/download/opentelemetry-operator.yaml
# OR install the otel-collector-contrib binary image directly as below.
#
# Set APPLICATIONINSIGHTS_CONNECTION_STRING via Key Vault secret / CSI driver
# or as a plain K8s Secret (see secrets-provider.yaml).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: supply-chain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: supply-chain
roleRef:
  kind: ClusterRole
  name: otel-collector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: supply-chain
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip

      filter/drop_healthz:
        traces:
          span:
            - 'attributes["http.target"] == "/healthz"'
            - 'attributes["http.target"] == "/health"'

      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 64

    exporters:
      azuremonitor:
        connection_string: ${env:APPLICATIONINSIGHTS_CONNECTION_STRING}

      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: supply_chain

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, filter/drop_healthz, batch]
          exporters:  [azuremonitor]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters:  [azuremonitor, prometheus]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters:  [azuremonitor]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: supply-chain
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/conf/collector.yaml"]
          env:
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: otel-collector-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
            # Downward API: pass pod IP so k8sattributes can match pods
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: prometheus
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
      terminationGracePeriodSeconds: 30
---
# ClusterIP service — agent pods send OTLP to otel-collector:4317
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: supply-chain
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
  type: ClusterIP

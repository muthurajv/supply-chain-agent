# Azure Key Vault Provider for Secrets Store CSI Driver
# Prerequisites:
#   helm repo add csi-secrets-store-provider-azure \
#     https://azure.github.io/secrets-store-csi-driver-provider-azure/charts
#   helm install csi-secrets-store-provider-azure/csi-secrets-store-provider-azure \
#     --generate-name --set secrets-store-csi-driver.syncSecret.enabled=true
#
# Replace <keyvault-name>, <tenant-id>, and <subscription-id> with your values.
# The managed identity / workload identity on the agent pods must have
# Key Vault Secrets User role on each secret below.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: supply-chain-agent-secrets
  namespace: supply-chain
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: ""                         # workload-identity client ID (set via Helm values)
    keyvaultName: "<keyvault-name>"
    tenantId: "<tenant-id>"
    objects: |
      array:
        - |
          objectName: azure-openai-api-key
          objectType: secret
          objectAlias: AZURE_OPENAI_API_KEY
        - |
          objectName: cosmos-conn-str
          objectType: secret
          objectAlias: COSMOS_CONNECTION_STRING
        - |
          objectName: azure-search-key
          objectType: secret
          objectAlias: AZURE_SEARCH_KEY
        - |
          objectName: aad-client-secret
          objectType: secret
          objectAlias: AAD_CLIENT_SECRET
        - |
          objectName: grafana-api-key
          objectType: secret
          objectAlias: GRAFANA_API_KEY
  secretObjects:
    - secretName: supply-chain-agent-secrets
      type: Opaque
      data:
        - objectName: AZURE_OPENAI_API_KEY
          key: AZURE_OPENAI_API_KEY
        - objectName: COSMOS_CONNECTION_STRING
          key: COSMOS_CONNECTION_STRING
        - objectName: AZURE_SEARCH_KEY
          key: AZURE_SEARCH_KEY
        - objectName: AAD_CLIENT_SECRET
          key: AAD_CLIENT_SECRET
        - objectName: GRAFANA_API_KEY
          key: GRAFANA_API_KEY
---
# Volume mount that makes the CSI secrets available to the agent pods.
# Add this patch to the agent Deployment (or include inline in deployment.yaml):
#
#   spec.template.spec.volumes:
#     - name: secrets-store
#       csi:
#         driver: secrets-store.csi.k8s.io
#         readOnly: true
#         volumeAttributes:
#           secretProviderClass: supply-chain-agent-secrets
#
#   spec.template.spec.containers[0].volumeMounts:
#     - name: secrets-store
#       mountPath: /mnt/secrets
#       readOnly: true
#
# The secretObjects block above syncs the Key Vault values into the
# supply-chain-agent-secrets Kubernetes Secret automatically, so the
# existing secretRef in deployment.yaml continues to work unchanged.
